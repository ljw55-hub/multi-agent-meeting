name: multi-agent-meeting

services:
  api:
    image: multi-agent-meeting-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_WHISPERX: ${INSTALL_WHISPERX:-false}
    container_name: multi-agent-meeting-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./web:/app/web
      - asr_models:/app/models
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - chromadb
    restart: unless-stopped

  worker:
    image: multi-agent-meeting-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_WHISPERX: ${INSTALL_WHISPERX:-false}
    container_name: multi-agent-meeting-worker
    env_file:
      - .env
    command: ["python", "-m", "src.worker"]
    volumes:
      - ./src:/app/src
      - asr_models:/app/models
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - chromadb
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: multi-agent-meeting-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: multi-agent-meeting-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: multi-agent-meeting-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
    name: multi-agent-meeting_postgres_data
  redis_data:
    name: multi-agent-meeting_redis_data
  chroma_data:
    name: multi-agent-meeting_chroma_data
  asr_models:
    name: multi-agent-meeting_asr_models
  uploads:
    name: multi-agent-meeting_uploads
