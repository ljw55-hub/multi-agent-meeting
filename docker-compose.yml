services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-hy-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
      - chromadb
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: multi-agent-hy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: multi-agent-hy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: multi-agent-hy-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
